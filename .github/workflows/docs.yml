name: Docs

# Verifies that the API documentation builds without any warnings (broken
# intra-doc links, invalid doc attributes, etc.). `-D warnings` turns every
# rustdoc lint into a hard error.
on:
  push:
    branches: ["main", "master"]
  pull_request:
  # Allows other workflows (e.g. publish) to run this check as a prerequisite.
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  doc:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build documentation
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps --locked --all-features
